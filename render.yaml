services:
  - type: web
    name: swrylakrok
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm run db:deploy && npm run db:bootstrap && npm run start:render
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 24.16.0
      - key: NODE_ENV
        value: production
